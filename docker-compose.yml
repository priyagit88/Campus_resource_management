version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campus_db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-campus_cms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campus_network

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: campus_app
    ports:
      - "3000:3000"
    environment:
      - DB_USER=${DB_USER:-admin}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-campus_cms}
      - DB_PASSWORD=${DB_PASSWORD:-password123}
      - DB_PORT=5432
      - PORT=3000
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./client:/client
    networks:
      - campus_network

networks:
  campus_network:

volumes:
  postgres_data:
